<body>
<div class="container">
    <div class="top-bar">
        <div class="api-config">✅ 接入豆包视觉大模型 | 智能识别组合数量 | 尺寸统一单位对比 | 忽略微小尺寸差异 | 首创规则（保护期内数量/尺寸/颜色不作为差异）</div>
        <button class="history-btn" id="openHistoryBtn">📜 历史记录</button>
    </div>

    <div id="comparisonContainer"></div>
</div>

<script>
    (function(){
        // ---------- 豆包API配置 ----------
        const API_KEY = "fbcfcc90-d805-42a1-9424-f983f423c09a";
        const ENDPOINT_ID = "ep-20260320164842-rsqff";
        const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";

        // ---------- 历史记录存储 ----------
        let historyRecords = [];
        const STORAGE_KEY = "ai_chat_history";

        function loadHistory() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    historyRecords = JSON.parse(stored);
                } catch(e) { historyRecords = []; }
            }
        }
        function saveHistory() {
            const toSave = historyRecords.map(rec => ({
                id: rec.id,
                groupId: rec.groupId,
                timestamp: rec.timestamp,
                summaryHtml: rec.summaryHtml,
                detailHtml: rec.detailHtml,
                isPass: rec.isPass,
                combinedDiff: rec.combinedDiff,
                newProductId: rec.newProductId,
                builtIds: rec.builtIds
            }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
        }
        function addHistoryRecord(groupId, summaryHtml, detailHtml, isPass, combinedDiff, newProductId, builtIds) {
            const record = {
                id: Date.now() + '_' + Math.random(),
                groupId: groupId,
                timestamp: new Date().toLocaleString(),
                summaryHtml: summaryHtml,
                detailHtml: detailHtml,
                isPass: isPass,
                combinedDiff: combinedDiff,
                newProductId: newProductId,
                builtIds: builtIds
            };
            historyRecords.unshift(record);
            if (historyRecords.length > 50) historyRecords.pop();
            saveHistory();
            if (historyModal && historyModal.style.display === 'flex') {
                renderHistoryPanel();
            }
        }
        function clearHistory() {
            historyRecords = [];
            saveHistory();
            if (historyModal && historyModal.style.display === 'flex') renderHistoryPanel();
        }

        // ---------- 辅助函数 ----------
        function extractNumber(str) {
            if (!str) return null;
            let cardMatch = str.match(/(\d+(?:\.\d+)?)\s*张/);
            if (cardMatch) return parseFloat(cardMatch[1]);
            let pieceMatch = str.match(/(\d+(?:\.\d+)?)\s*个/);
            if (pieceMatch) return parseFloat(pieceMatch[1]);
            let setMatch = str.match(/(\d+(?:\.\d+)?)\s*套\s*(\d+(?:\.\d+)?)\s*个/);
            if (setMatch) return parseFloat(setMatch[2]);
            let simple = str.match(/(\d+(?:\.\d+)?)/);
            return simple ? parseFloat(simple[1]) : null;
        }

        function convertToCm(str) {
            if (!str) return null;
            let feetInchMatch = str.match(/(\d+(?:\.\d+)?)\s*['′]\s*(?:(\d+(?:\.\d+)?)\s*["″]?)?/);
            if (feetInchMatch) {
                const feet = parseFloat(feetInchMatch[1]);
                const inches = feetInchMatch[2] ? parseFloat(feetInchMatch[2]) : 0;
                return feet * 30.48 + inches * 2.54;
            }
            let match = str.match(/^([\d.]+)\s*([a-zA-Z'"]+)?/);
            if (!match) return null;
            const num = parseFloat(match[1]);
            let unit = match[2] ? match[2].toLowerCase() : '';
            if (unit === "'" || unit === '′' || unit === 'ft') unit = 'ft';
            if (unit === '"' || unit === '″' || unit === 'in' || unit === 'inch' || unit === 'inches') unit = 'in';
            switch (unit) {
                case 'cm': return num;
                case 'mm': return num / 10;
                case 'm': return num * 100;
                case 'ft': return num * 30.48;
                case 'in': return num * 2.54;
                default: return num;
            }
        }

        function calcQuantityDiff(builtVal, unbuiltVal) {
            const b = extractNumber(builtVal);
            const u = extractNumber(unbuiltVal);
            if (b === null || u === null || b === 0) return null;
            return Math.abs(u - b) / b * 100;
        }

        function calcSingleDimDiff(builtVal, unbuiltVal) {
            const bCm = convertToCm(builtVal);
            const uCm = convertToCm(unbuiltVal);
            if (bCm === null || uCm === null || bCm === 0) return null;
            const absDiffCm = Math.abs(uCm - bCm);
            const diffPercent = absDiffCm / bCm * 100;
            if (diffPercent < 10 || absDiffCm < 4) return null;
            return diffPercent;
        }

        function calcSizeDiffStructured(builtSizeObj, unbuiltSizeObj) {
            if (!builtSizeObj || !unbuiltSizeObj) return null;
            const keys = new Set([...Object.keys(builtSizeObj), ...Object.keys(unbuiltSizeObj)]);
            let diffs = [];
            for (let key of keys) {
                const bVal = builtSizeObj[key];
                const uVal = unbuiltSizeObj[key];
                if (bVal && uVal) {
                    const diff = calcSingleDimDiff(bVal, uVal);
                    if (diff !== null) diffs.push(diff);
                }
            }
            if (diffs.length === 0) return null;
            return diffs.reduce((a,b) => a+b, 0) / diffs.length;
        }

        // 材质大类判断（简化的类别分组）
        const materialCategories = {
            '金属': ['铁','钢','不锈钢','铝','铜','金属','合金','锌合金'],
            '木材': ['木','木质','竹','实木','密度板'],
            '塑料': ['塑料','PP','PVC','ABS','亚克力','树脂','硅胶','橡胶'],
            '玻璃': ['玻璃','钢化玻璃','水晶'],
            '陶瓷': ['陶瓷','瓷','陶'],
            '布艺': ['布','棉','麻','绒','毛毡'],
            '纸': ['纸','卡纸','牛皮纸'],
            '其他': []
        };
        function getMaterialCategory(material) {
            if (!material) return '未知';
            for (let [cat, keywords] of Object.entries(materialCategories)) {
                if (keywords.some(kw => material.includes(kw))) return cat;
            }
            return '其他';
        }
        function isMaterialCategoryDiff(materialA, materialB) {
            const catA = getMaterialCategory(materialA);
            const catB = getMaterialCategory(materialB);
            return catA !== catB && catA !== '未知' && catB !== '未知';
        }

        // 首创规则判断（根据附件规则重写）
        function evaluatePioneerRule(quantityDiff, sizeDiff, colorSame, patternDiff, buildDate, productType, materialA, materialB) {
            if (!buildDate) return { pass: false, message: "缺少建SKU时间，无法判断首创规则" };
            const now = new Date();
            const buildTime = new Date(buildDate);
            const monthsDiff = (now.getFullYear() - buildTime.getFullYear()) * 12 + (now.getMonth() - buildTime.getMonth());
            const protectionMonths = (productType === 'seasonal') ? 12 : 9;
            const inProtection = monthsDiff < protectionMonths;
            
            if (inProtection) {
                // 保护期内：数量、尺寸、颜色不作为差异维度。仅考虑图文差异和材质大类差异
                let significant = false;
                let reasons = [];
                if (patternDiff !== null && patternDiff >= 50) {
                    significant = true;
                    reasons.push(`图文差异度${Math.round(patternDiff)}%≥50%`);
                }
                const materialDiff = isMaterialCategoryDiff(materialA, materialB);
                if (materialDiff) {
                    significant = true;
                    reasons.push(`材质大类不同（${getMaterialCategory(materialA)} vs ${getMaterialCategory(materialB)}）`);
                }
                if (significant) {
                    return { pass: true, message: `保护期内，因${reasons.join('、')}，视为有效差异，允许通过。` };
                } else {
                    return { pass: false, message: `保护期内（${protectionMonths}个月），新品在图文和材质上均无显著差异，不予通过。` };
                }
            } else {
                // 保护期外：需要2个维度差异且其中一个维度差异≥50%（数量、尺寸、颜色、图文）
                let dims = [];
                if (quantityDiff !== null && quantityDiff >= 50) dims.push(`数量差异${Math.round(quantityDiff)}%`);
                if (sizeDiff !== null && sizeDiff >= 50) dims.push(`尺寸差异${Math.round(sizeDiff)}%`);
                if (!colorSame) dims.push('颜色不同');
                if (patternDiff !== null && patternDiff >= 50) dims.push(`图文差异${Math.round(patternDiff)}%`);
                if (dims.length >= 2) {
                    return { pass: true, message: `保护期外，存在${dims.length}个显著差异维度：${dims.join('、')}，满足2个维度差异要求，允许通过。` };
                } else {
                    return { pass: false, message: `保护期外，仅${dims.length}个显著差异维度，未达到2个维度要求，不予通过。` };
                }
            }
        }

        // ---------- 豆包API调用 ----------
        async function callDoubaoProductComparison(imgBase64A, imgBase64B, textA, textB) {
            const base64A = imgBase64A.split(',')[1];
            const base64B = imgBase64B.split(',')[1];
            
            const prompt = `请对比以下两张产品图片（分别对应【已建产品】和【未建产品】），结合可能提供的文字说明，分析两个产品的实际产品设计差异。任务：

1. 识别图片中的产品形态、图案、结构，以及图片中可能出现的文字描述（如“做成右边灯笼款式”、“数量10个”、“1套12个”等）。数量描述中若出现“X套Y个”，实际数量应为Y个（总个数），而不是套数。
2. 对于每个产品，请提取以下信息（如有，若没有则标注“未识别”）：
   - 产品简短描述（30字以内，概括款式、特征）
   - 数量：提取实际总数量（数字+单位，例如“12个”）。如果出现“1套12个”，则数量为“12个”。
   - 尺寸：请根据产品形状，尽可能提取关键维度的数值，格式为对象。例如：
       * 长方体/立方体：{"length": "30cm", "width": "20cm", "height": "10cm"}
       * 圆形/圆柱：{"diameter": "15cm", "height": "20cm"}
       * 不规则：{"overall": "30x20x10cm"} 或根据实际提取。
     注意：必须将相同维度的数值放在对应字段下，以便后续进行同维度对比（长度对比长度，宽度对比宽度）。
   - 颜色（如“红色”、“白+金”等）
   - 材质（如“不锈钢”、“木质”等）
3. 分析产品的核心功能与用途：该产品主要用来做什么？解决什么问题？功能上有何特点？请分别描述两个产品，并给出总结性判断（例如“功能一致”、“功能差异较小”、“功能差异较大”）。同时，请分析材质差异对功能用途的影响，并输出材质影响分析。

        function compressImageToBase64(dataUrl, maxSide=800, quality=0.8) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxSide || h > maxSide) {
                        if (w > h) { h = h * (maxSide / w); w = maxSide; }
                        else { w = w * (maxSide / h); h = maxSide; }
                    }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = dataUrl;
            });
        }

                        const isFunctionConsistent = result.function_usage_summary && result.function_usage_summary.includes('一致');
                        const isSceneConsistent = result.scene_audience_summary && result.scene_audience_summary.includes('一致');
                        
                        let functionHtml = `<div class="diff-item"><div class="diff-label">核心功能与用途</div><div class="diff-desc">`;
                        functionHtml += `<span class="summary-badge">${result.function_usage_summary ? result.function_usage_summary.split('。')[0] : '分析中'}</span>`;
                        if (!isFunctionConsistent) {
                            functionHtml += `<br><strong>未建：</strong> ${result.unbuilt_function_usage || '—'}<br>`;
                            functionHtml += `<strong>已建：</strong> ${result.built_function_usage || '—'}<br>`;
                        }
                        functionHtml += `${result.function_usage_summary ? `<div style="margin-top:6px; color:#1e293b;">📌 ${result.function_usage_summary}</div>` : ''}`;
                        if (result.function_usage_material_impact && result.function_usage_material_impact !== '无') {
                            functionHtml += `<div class="material-impact">🔧 材质影响：${result.function_usage_material_impact}</div>`;
                        }
                        if (result.function_usage_cost_impact && result.function_usage_cost_impact !== '无') {
                            functionHtml += `<div class="cost-impact">💰 成本影响：${result.function_usage_cost_impact}</div>`;
                        }
                        functionHtml += `</div></div>`;
                        
                        let sceneHtml = `<div class="diff-item"><div class="diff-label">使用人群与场景</div><div class="diff-desc">`;
                        sceneHtml += `<span class="summary-badge">${result.scene_audience_summary ? result.scene_audience_summary.split('。')[0] : '分析中'}</span>`;
                        if (!isSceneConsistent) {
                            sceneHtml += `<br><strong>未建：</strong> ${result.unbuilt_scene_audience || '—'}<br>`;
                            sceneHtml += `<strong>已建：</strong> ${result.built_scene_audience || '—'}<br>`;
                        }
                        sceneHtml += `${result.scene_audience_summary ? `<div style="margin-top:6px; color:#1e293b;">📌 ${result.scene_audience_summary}</div>` : ''}`;
                        if (result.scene_audience_material_impact && result.scene_audience_material_impact !== '无') {
                            sceneHtml += `<div class="material-impact">🔧 材质影响：${result.scene_audience_material_impact}</div>`;
                        }
                        if (result.scene_audience_cost_impact && result.scene_audience_cost_impact !== '无') {
                            sceneHtml += `<div class="cost-impact">💰 成本影响：${result.scene_audience_cost_impact}</div>`;
                        }
                        sceneHtml += `</div></div>`;
                        
                        const pioneerRuleHtml = (built.compareType === 'pioneer') ? `<div class="diff-item"><div class="diff-label">📋 首创规则判定</div><div class="diff-desc">${pioneerMessage}</div></div>` : '';
                        
                        const itemDetailHtml = `
                            <div class="built-item" style="margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px;">
                                <h4 style="margin-bottom: 12px;">📊 对比已建 ${key.split('_')[1]}</h4>
                                <div class="product-descriptions">
                                    <div class="product-card"><h4>📦 未建</h4><div class="product-desc-text">${result.unbuilt_product_desc || '—'}${unbuiltAttr.length ? `<div class="attr">${unbuiltAttr.join(' · ')}</div>` : ''}</div></div>
                                    <div class="product-card"><h4>🏷️ 已建</h4><div class="product-desc-text">${result.built_product_desc || '—'}${builtAttr.length ? `<div class="attr">${builtAttr.join(' · ')}</div>` : ''}</div></div>
                                </div>
                                <div class="dimension-summary">
                                    <div class="dimension-card"><h4>📊 方案差异度</h4><div class="dimension-value">${schemeDiffRounded !== null ? schemeDiffRounded + '%' : '—'}</div><div class="sub-value">数量差 + 尺寸差(显著维度平均)</div></div>
                                    <div class="dimension-card"><h4>🎨 图案差异度</h4><div class="dimension-value">${Math.round(appearanceDiff)}%</div><div class="sub-value">豆包AI视觉分析</div></div>
                                    <div class="dimension-card"><h4>⚖️ 综合差异度</h4><div class="dimension-value">${combinedRounded}%</div><div class="sub-value">数量差 + 尺寸差 + 图案差</div></div>
                                </div>
                                <div class="formula-area">
                                    <div><strong>📐 计算过程：</strong></div>
                                    ${quantityDiff !== null ? `<div>数量差异 = |${extractNumber(result.unbuilt_quantity)} - ${extractNumber(result.built_quantity)}| / ${extractNumber(result.built_quantity)} × 100% = ${Math.round(quantityDiff)}%</div>` : '<div>数量差异 = 数据缺失</div>'}
                                    ${sizeDiff !== null ? `<div>尺寸差异（显著维度平均，忽略微小差异） = ${Math.round(sizeDiff)}%</div>` : '<div>尺寸差异 = 数据缺失</div>'}
                                    <div>图案差异 = ${Math.round(appearanceDiff)}% (豆包AI)</div>
                                    ${quantityDiff !== null && sizeDiff !== null ? `<div>综合差异 = ${Math.round(quantityDiff)}% + ${Math.round(sizeDiff)}% + ${Math.round(appearanceDiff)}% = ${combinedRounded}%</div>` : 
                                      (quantityDiff !== null ? `<div>综合差异 = ${Math.round(quantityDiff)}% + 0% + ${Math.round(appearanceDiff)}% = ${combinedRounded}%</div>` :
                                       (sizeDiff !== null ? `<div>综合差异 = 0% + ${Math.round(sizeDiff)}% + ${Math.round(appearanceDiff)}% = ${combinedRounded}%</div>` :
                                        `<div>综合差异 = 0% + 0% + ${Math.round(appearanceDiff)}% = ${combinedRounded}%</div>`))}
                                </div>
                                <div class="diff-detail">
                                    ${functionHtml}
                                    ${sceneHtml}
                                    ${pioneerRuleHtml}
                                    <div class="diff-item"><div class="diff-label">整体目视化差异</div><div class="diff-desc">${result.visual_overall || '—'}</div></div>
                                    <div class="diff-item"><div class="diff-label">形状与轮廓</div><div class="diff-desc">${result.shape_contour || '—'}</div></div>
                                    <div class="diff-item"><div class="diff-label">图案与装饰</div><div class="diff-desc">${result.pattern_decoration || '—'}</div></div>
                                    <div class="diff-item"><div class="diff-label">结构与部件</div><div class="diff-desc">${result.structure_parts || '—'}</div></div>
                                    <div class="diff-item"><div class="diff-label">📌 总结性分析</div><div class="diff-desc">${result.summary || '—'}</div></div>
                                </div>
                                <div class="final-conclusion" style="margin-top: 8px;">
                                    <div class="conclusion-text ${isPass ? 'pass' : 'fail'}">${isPass ? '该已建对比通过' : '该已建对比不通过'}</div>
                                    <div class="conclusion-reason">综合差异度${combinedRounded}% ${isPass ? '≥50%' : '<50%'} ${built.compareType === 'pioneer' ? (pioneerRulePass ? '且符合首创规则' : '但不符合首创规则') : ''}</div>
                                </div>
                            </div>
                        `;
                        allDetailsHtml += itemDetailHtml;
                    }
                    
                    const finalPass = overallPass;
                    const summaryHtml = `
                        <div class="result-summary" id="${cardId}_summary">
                            <div class="summary-stats">
                                <div class="stat"><span class="stat-value">${finalPass ? '✅ 通过' : '❌ 不通过'}</span></div>
                                <div class="stat"><span class="stat-value">${Math.round(finalCombinedMin)}%</span><span class="stat-label">最小综合差异</span></div>
                            </div>
                            <span class="toggle-icon">▼</span>
                        </div>
                        <div id="${cardId}_detail" class="result-detail" style="display: none;">${allDetailsHtml}</div>
                    `;
                    resultArea.innerHTML = summaryHtml;
                    
                    const summaryDiv = document.getElementById(`${cardId}_summary`);
                    const detailDiv = document.getElementById(`${cardId}_detail`);
                    summaryDiv.addEventListener('click', () => {
                        const isHidden = detailDiv.style.display === 'none';
                        detailDiv.style.display = isHidden ? 'block' : 'none';
                        summaryDiv.querySelector('.toggle-icon').textContent = isHidden ? '▲' : '▼';
                    });
                    
                    const builtIds = Object.keys(builtItems).map(k => builtItems[k].id).filter(id => id);
                    addHistoryRecord(cardIndex, summaryHtml, allDetailsHtml, finalPass, Math.round(finalCombinedMin), unbuilt.newProductId, builtIds);
                    
                } catch (error) {
                    console.error(error);
                    resultArea.innerHTML = `<div class="loading">❌ AI分析失败：${error.message}。请检查网络或稍后重试。</div>`;
                } finally {
                    compareBtn.disabled = false;
                    compareBtn.textContent = "🔍 启动AI对比分析";
                }
            };
        }

        // ---------- 历史记录面板 ----------
        let historyModal = null;
        function createHistoryModal() {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal-overlay';
            modalDiv.style.display = 'none';
            modalDiv.innerHTML = `
                <div class="modal-container">
                    <div class="modal-header">
                        <h3>📋 历史分析记录</h3>
                        <button class="close-modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <div class="search-box">
                            <input type="text" id="historySearchInput" placeholder="按新品ID或已建ID搜索">
                            <button id="historySearchBtn">搜索</button>
                            <button id="historyResetBtn">重置</button>
                        </div>
                        <div id="historyListContainer"></div>
                        <button class="clear-history" id="clearHistoryBtn">清空所有记录</button>
                        <div id="historyDetailContainer" class="history-detail" style="display: none;"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            return modalDiv;
        }

        function renderHistoryPanel(searchTerm = '') {
            const container = document.getElementById('historyListContainer');
            if (!container) return;
            let filtered = historyRecords;
            if (searchTerm.trim()) {
                const term = searchTerm.trim().toLowerCase();
                filtered = historyRecords.filter(rec => 
                    (rec.newProductId && rec.newProductId.toLowerCase().includes(term)) ||
                    (rec.builtIds && rec.builtIds.some(id => id && id.toLowerCase().includes(term)))
                );
            }
            if (filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">暂无匹配记录</p>';
                document.getElementById('historyDetailContainer').style.display = 'none';
                return;
            }
            let html = '<ul class="history-list">';
            filtered.forEach((rec, idx) => {
                const passClass = rec.isPass ? 'pass' : 'fail';
                html += `
                    <li class="history-item ${passClass}" data-original-idx="${historyRecords.findIndex(r => r.id === rec.id)}">
                        <div class="history-header">
                            <span>对比组 ${rec.groupId} ${rec.newProductId ? `(新品:${rec.newProductId})` : ''} ${rec.builtIds && rec.builtIds.length ? `(已建:${rec.builtIds.join(',')})` : ''}</span>
                            <span>${rec.timestamp}</span>
                        </div>
                        <div class="history-stats">
                            最小综合差异: ${rec.combinedDiff}% | 
                            ${rec.isPass ? '✅ 通过' : '❌ 不通过'}
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            container.innerHTML = html;
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const originalIdx = parseInt(item.dataset.originalIdx);
                    const rec = historyRecords[originalIdx];
                    const detailContainer = document.getElementById('historyDetailContainer');
                    detailContainer.innerHTML = `<div style="margin-bottom:12px;"><strong>📅 ${rec.timestamp} | 对比组 ${rec.groupId}</strong>${rec.newProductId ? ` | 新品ID: ${rec.newProductId}` : ''}${rec.builtIds && rec.builtIds.length ? ` | 已建ID: ${rec.builtIds.join(',')}` : ''}</div>${rec.detailHtml}`;
                    detailContainer.style.display = 'block';
                });
            });
        }

        // ---------- 初始化10个对比组 ----------
        loadHistory();
        const container = document.getElementById('comparisonContainer');
        for (let i = 1; i <= 10; i++) {
            const card = createComparisonCard(i);
            container.appendChild(card);
            initCard(i);
        }
        document.querySelectorAll('.card-header').forEach(header => {
            header.addEventListener('click', (e) => {
                const targetId = header.getAttribute('data-toggle');
                const contentDiv = document.getElementById(targetId);
                if (contentDiv) {
                    const isVisible = contentDiv.style.display !== 'none';
                    contentDiv.style.display = isVisible ? 'none' : 'block';
                    header.querySelector('.toggle-icon').textContent = isVisible ? '▶' : '▼';
                }
            });
        });
        
        const modal = createHistoryModal();
        const openBtn = document.getElementById('openHistoryBtn');
        openBtn.addEventListener('click', () => {
            renderHistoryPanel();
            modal.style.display = 'flex';
        });
        modal.querySelector('.close-modal').addEventListener('click', () => {
            modal.style.display = 'none';
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            if (confirm('确定清空所有历史记录吗？')) {
                clearHistory();
                renderHistoryPanel();
            }
        });
        const searchInput = document.getElementById('historySearchInput');
        const searchBtn = document.getElementById('historySearchBtn');
        const resetBtn = document.getElementById('historyResetBtn');
        searchBtn.addEventListener('click', () => {
            renderHistoryPanel(searchInput.value);
        });
        resetBtn.addEventListener('click', () => {
            searchInput.value = '';
            renderHistoryPanel('');
        });
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') renderHistoryPanel(searchInput.value);
        });
    })();
</script>
</body>
</html>
