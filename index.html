<!DOCTYPE html>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif; }
        body { width:100%; max-width:1200px; margin:0 auto; padding:30px 20px; background:#f8fafc; }

        .delete-img-btn:hover { background:#dc2626; }

        .history-header { background:#f1f5f9; padding:12px 20px; font-weight:bold; font-size:18px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }

        .dimension-card { background:#f1f5f9; border-radius:16px; padding:12px; text-align:center; min-width:140px; }
        .dimension-value { font-size:26px; font-weight:800; }
        .formula-area { background:#f9fafb; border-radius:12px; padding:10px; font-size:12px; font-family:monospace; margin-bottom:16px; }
        .diff-detail { background:#f9fafb; border-radius:16px; padding:12px; }
        .diff-item { border-bottom:1px solid #e2e8f0; padding:10px 0; }
        .diff-label { font-weight:700; margin-bottom:4px; font-size:13px; }
        .diff-desc { font-size:13px; line-height:1.4; }
        .summary-badge { background:#e2e8f0; display:inline-block; padding:2px 8px; border-radius:20px; font-size:13px; font-weight:600; margin-right:8px; }
        .final-conclusion { background:#fef9e3; border-radius:16px; padding:12px; text-align:center; margin-top:16px; }
        .conclusion-text { font-size:24px; font-weight:800; }
        .conclusion-text.pass { color:#15803d; }
        .conclusion-text.fail { color:#b91c1c; }
        .loading { text-align:center; padding:20px; color:#2563eb; }
        .built-item-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .built-item-header h4 { font-size:16px; }
        .pioneer-controls { margin-top:12px; padding-top:12px; border-top:1px solid #e2e8f0; display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
        .pioneer-controls label { font-size:14px; display:inline-flex; align-items:center; gap:6px; }
        .pioneer-controls input[type="radio"] { margin:0; }

        .pioneer-controls select { padding:4px 8px; border-radius:8px; border:1px solid #cbd5e1; }
        .competition-level-box { background:#f0f9ff; padding:8px 12px; border-radius:12px; margin-bottom:12px; border-left:4px solid #0284c7; }
        .competition-level-box .label { font-weight:700; color:#0369a1; margin-bottom:6px; font-size:13px; }

        @media (max-width:700px) {
            .compare-layout { flex-direction:column; }

            .record-info { flex-direction:column; align-items:flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>AI查重助手<span class="version-badge">v1.0</span></h1>
    <div class="comparison-card">
        <div class="card-header"><label>新品ID：</label><input type="text" id="newProductId" placeholder="如 2424704"></div>
        <div class="card-content">
            <div class="config-bar">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span class="highlight-label">已建数量：</span>
                    <select id="builtCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option></select>

            </div>

                <div class="unbuilt-area">

                    <div class="price-input"><label>💰 价格 (美元)</label><input type="number" step="0.01" id="unbuiltPrice" placeholder="如 19.99（选填）"></div>

                        <img id="unbuiltPreview" class="preview-img">

    <div class="qa-section">

        <div class="qa-body">
            <div class="qa-input-group"><input type="text" id="qaQuestion" placeholder="输入您的问题，例如：炻器是否属于陶瓷材质？"><button id="qaAskBtn">提问</button></div>
            <div id="qaAnswer" class="qa-answer" style="display:none;"></div>

    <div class="history-section">
        <div class="history-header">
            <span>📋 查重记录</span>
            <div class="search-box">
                <input type="text" id="historySearchInput" placeholder="按新品ID搜索">
                <button id="historySearchBtn">搜索</button>
                <button id="historyResetBtn">重置</button>
                <button class="clear-history" id="clearHistoryBtn">清空记录</button>
            </div>
        </div>
        <div id="recordsList" class="records-list"></div>
    </div>
</div>
<script>
(function(){
    const API_KEY = "fbcfcc90-d805-42a1-9424-f983f423c09a";
    const ENDPOINT_ID = "ep-20260320164842-rsqff";
    const API_URL = "https://ark.cn-beijing.volces.com/api/v3/chat/completions";
    const DB_NAME="AIChatHistoryDB", DB_VERSION=2, STORE_NAME="records";
    let historyRecords=[], db=null;

    function openDB(){ return new Promise((resolve,reject)=>{ if(db&&db.name===DB_NAME){resolve(db);return;} const r=indexedDB.open(DB_NAME,DB_VERSION); r.onerror=e=>reject(e.target.error); r.onsuccess=e=>{db=e.target.result;resolve(db);}; r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME,{keyPath:"id"}); }; }); }
    async function loadHistory(){ try{ const database=await openDB(); const tx=database.transaction(STORE_NAME,"readonly"); const store=tx.objectStore(STORE_NAME); const req=store.getAll(); const rec=await new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); rec.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)); historyRecords=rec; renderRecordsList(); }catch(e){ console.error(e); historyRecords=[]; renderRecordsList(); } }
    async function saveHistory(){ try{ const database=await openDB(); const tx=database.transaction(STORE_NAME,"readwrite"); const store=tx.objectStore(STORE_NAME); await new Promise((res,rej)=>{ const cr=store.clear(); cr.onsuccess=()=>res(); cr.onerror=()=>rej(cr.error); }); for(const r of historyRecords) store.add(r); await new Promise((res,rej)=>{ tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }catch(e){ console.error(e); } }
    async function addRecord(r){ historyRecords.unshift(r); await saveHistory(); renderRecordsList(); }
    async function updateRecord(id,upd){ const idx=historyRecords.findIndex(r=>r.id===id); if(idx!==-1){ historyRecords[idx]={...historyRecords[idx],...upd}; await saveHistory(); renderRecordsList(); } }
    async function clearHistory(){ historyRecords=[]; await saveHistory(); renderRecordsList(); }

    function safeString(s){ return typeof s==='string'?s:''; }
    function formatPercent(v){ if(v===null||v===undefined) return '—'; if(v>100) return '100%+'; return Math.round(v)+'%'; }

    function isComplexCombinationProduct(t){ if(!t) return false; const plus=(t.match(/\+/g)||[]).length; if(plus>=2) return true; const m=t.match(/(\d+(?:\.\d+)?)\s*(?:个|张|条|把|件|套)/g); return m&&m.length>=3; }
    function isCompositeWithMismatchedQuantity(a,b){
        if(!a||!b) return false;
        const extract=s=>{ const m=s.match(/(\d+(?:\.\d+)?)\s*(?:个|张|条|把|件|套)/g)||[]; return m.map(x=>{ const n=parseFloat(x.match(/\d+(?:\.\d+)?/)[0]); const u=x.replace(/[\d\.\s]/g,''); return {num:n,unit:u}; }); };
        const uA=extract(a), uB=extract(b);
        if(uA.length>=2 && uB.length>=2){
            const setA=new Set(uA.map(u=>u.unit)), setB=new Set(uB.map(u=>u.unit));
            if(setA.size!==setB.size) return true;
            let common=false; for(let u of setA) if(setB.has(u)){common=true;break;} if(!common) return true;
            if(uA.length!==uB.length) return true;
            const sumA=uA.reduce((s,c)=>s+c.num,0), sumB=uB.reduce((s,c)=>s+c.num,0);
            if(Math.abs(sumA-sumB)>2) return true;
        }
        return false;
    }

    function parseQuantity(s){
        const str=safeString(s); if(!str) return {value:null,status:'none',reason:''};
        if(str.includes('点胶')) return {value:null,status:'ignore',reason:'含点胶数量，已忽略'};
        let m=str.match(/(?:共|总计|合计)\s*(\d+(?:\.\d+)?)\s*(?:件|个|套|条|把)/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:`从“${m[0]}”提取`};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*(?:个|张|条|把|件|套)/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*张/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*个/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*套/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*条/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*把/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        m=str.match(/^(\d+(?:\.\d+)?)$/); if(m) return {value:parseFloat(m[1]),status:'ok',reason:''};
        return {value:null,status:'none',reason:'未识别数量'};
    }
    function calcQuantityDiff(bV,uV,bT,uT){
        const bp=parseQuantity(bV), up=parseQuantity(uV);
        if(isComplexCombinationProduct(bT)||isComplexCombinationProduct(uT)) return {diff:null,reason:'复杂组合产品，不参与计算',skip:true};
        if(isCompositeWithMismatchedQuantity(bT,uT)) return {diff:null,reason:'组合产品无明确数量配套关系，不参与计算',skip:true};
        if(bp.value!==null&&up.value!==null){ const max=Math.max(bp.value,up.value),min=Math.min(bp.value,up.value); if(max/min>=10&&(isComplexCombinationProduct(bT)||isComplexCombinationProduct(uT))) return {diff:null,reason:'复杂组合产品',skip:true}; }
        if(bp.status==='ignore'||up.status==='ignore'||bp.status==='ambiguous'||up.status==='ambiguous') return {diff:null,reason:bp.reason||up.reason||'不便计算',skip:false};
        if(bp.value===null||up.value===null) return {diff:null,reason:'数量未识别',skip:false};
        const b=bp.value, u=up.value; if(b===0) return {diff:null,reason:'已建数量为0',skip:false};
        return {diff:Math.abs(u-b)/b*100, reason:null, skip:false};
    }
    function extractNumber(s){ const str=safeString(s); if(!str) return null; let m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*张/); if(m) return parseFloat(m[1]); m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*个/); if(m) return parseFloat(m[1]); m=str.match(/(?:^|\s|[^a-zA-Z\d])(\d+(?:\.\d+)?)\s*套/); if(m) return parseFloat(m[1]); m=str.match(/^(\d+(?:\.\d+)?)$/); if(m) return parseFloat(m[1]); return null; }
    function convertToCm(s){ const str=safeString(s); if(!str) return null; let m=str.match(/(\d+(?:\.\d+)?)\s*['′]\s*(?:(\d+(?:\.\d+)?)\s*["″]?)?/); if(m){ const f=parseFloat(m[1]), i=m[2]?parseFloat(m[2]):0; return f*30.48+i*2.54; } m=str.match(/^([\d.]+)\s*([a-zA-Z\u4e00-\u9fa5]+)?/); if(!m) return null; const num=parseFloat(m[1]); let u=m[2]?m[2].toLowerCase():''; if(u==='cm'||u==='厘米') return num; if(u==='mm'||u==='毫米') return num/10; if(u==='m'||u==='米') return num*100; if(u==='ft'||u==='英尺') return num*30.48; if(u==='in'||u==='inch'||u==='inches'||u==='英寸') return num*2.54; return num; }
    function calcSingleDimDiff(b,u){ const bc=convertToCm(b), uc=convertToCm(u); if(bc===null||uc===null||bc===0) return null; const diff=Math.abs(uc-bc); if(diff<4) return null; return diff/bc*100; }
    function calcSizeDiffStructured(bObj,uObj){ if(!bObj||!uObj) return {diff:null,reason:'未识别'}; const keys=new Set([...Object.keys(bObj),...Object.keys(uObj)]); let diffs=[]; for(let k of keys){ const bv=bObj[k], uv=uObj[k]; if(bv&&uv){ const d=calcSingleDimDiff(bv,uv); if(d!==null) diffs.push(d); } } if(diffs.length===0) return {diff:null,reason:'微小'}; return {diff:diffs.reduce((a,b)=>a+b,0)/diffs.length,reason:null}; }

    const materialCategories={ '金属':['铁','钢','不锈钢','铝','铜','金属','合金','锌合金'], '木材':['木','木质','竹','实木','密度板'], '塑料':['塑料','PP','PVC','ABS','亚克力','树脂','硅胶','橡胶'], '玻璃':['玻璃','钢化玻璃','水晶'], '陶瓷':['陶瓷','瓷','陶','炻器'], '布艺':['布','棉','麻','绒','毛毡'], '纸':['纸','卡纸','牛皮纸'], '其他':[] };

            const uAttr=[], bAttr=[];
            if(res.unbuilt_quantity) uAttr.push(`📦 数量：${res.unbuilt_quantity}`); if(uSizeStr) uAttr.push(`📏 尺寸：${uSizeStr}`); if(res.unbuilt_color) uAttr.push(`🎨 颜色：${res.unbuilt_color}`); if(res.unbuilt_material) uAttr.push(`🔧 材质：${res.unbuilt_material}`); if(res.unbuilt_cost_level) uAttr.push(`💰 成本：${res.unbuilt_cost_level}`);
            if(res.built_quantity) bAttr.push(`📦 数量：${res.built_quantity}`); if(bSizeStr) bAttr.push(`📏 尺寸：${bSizeStr}`); if(res.built_color) bAttr.push(`🎨 颜色：${res.built_color}`); if(res.built_material) bAttr.push(`🔧 材质：${res.built_material}`); if(res.built_cost_level) bAttr.push(`💰 成本：${res.built_cost_level}`);

            let sizeDisp=''; if(sizeReason==='未识别') sizeDisp='<div>尺寸差异 = 未识别</div>'; else if(sizeReason==='微小') sizeDisp='<div>尺寸差异 = 微小</div>'; else if(sizeReason==='复杂组合产品') sizeDisp='<div>尺寸差异 = 复杂组合产品，不参与计算</div>'; else sizeDisp=`<div>尺寸差异（显著维度平均） = ${formatPercent(sizeDiff)}</div>`;
            let qDisp=''; 
            if(skipQ && qReason==='复杂组合产品，不参与计算') qDisp='<div>数量差异 = 复杂组合产品，不参与计算</div>'; 
            else if(skipQ && qReason.includes('组合产品无明确数量配套关系')) qDisp='<div>数量差异 = 组合产品无明确数量配套关系，不参与计算</div>'; 
            else if(qReason) qDisp=`<div>数量差异 = ${qReason}</div>`; 
            else if(qDiff !== null && !isNaN(qDiff)) qDisp=`<div>数量差异 = |${extractNumber(res.unbuilt_quantity)} - ${extractNumber(res.built_quantity)}| / ${extractNumber(res.built_quantity)} × 100% = ${formatPercent(qDiff)}</div>`; 
            else qDisp='<div>数量差异 = 数据缺失</div>';

            const funcHtml=`<div class="diff-item"><div class="diff-label">核心功能与用途</div><div class="diff-desc"><span class="summary-badge">${res.function_usage_summary?res.function_usage_summary.split('。')[0]:'分析中'}</span>${(!res.function_usage_summary||!res.function_usage_summary.includes('一致'))?`<br><strong>未建：</strong> ${res.unbuilt_function_usage||'—'}<br><strong>已建：</strong> ${res.built_function_usage||'—'}`:''}</div></div>`;
            const sceneHtml=`<div class="diff-item"><div class="diff-label">使用人群与场景</div><div class="diff-desc"><span class="summary-badge">${res.scene_audience_summary?res.scene_audience_summary.split('。')[0]:'分析中'}</span>${(!res.scene_audience_summary||!res.scene_audience_summary.includes('一致'))?`<br><strong>未建：</strong> ${res.unbuilt_scene_audience||'—'}<br><strong>已建：</strong> ${res.built_scene_audience||'—'}`:''}</div></div>`;
            const compHtml=`<div class="diff-item"><div class="diff-label">🏆 上架竞争程度分析</div><div class="diff-desc"><div class="competition-level-box"><div class="label">判定等级</div><div>${res.competition_level||'未判定'}</div></div><div class="competition-analysis-text"><strong>详细分析：</strong><br>${(res.competition_analysis||'无详细分析').replace(/\n/g,'<br>')}</div>${res.submarket_difference_analysis?`<div class="submarket-box"><div class="label">细分市场差异分析</div><div class="content">${res.submarket_difference_analysis.replace(/\n/g,'<br>')}</div></div>`:''}</div></div>`;
            const pioneerHtml=isPio?`<div class="diff-item"><div class="diff-label">📋 首创规则判定</div><div class="diff-desc">${passReason}</div></div>`:'';

            allHtml+=`
                <div style="margin-bottom:20px; border:1px solid #e2e8f0; border-radius:16px; padding:12px;">
                    <h4 style="margin-bottom:12px;">📊 对比已建 ${i+1}</h4>
                    <div class="product-descriptions">
                        <div class="product-card"><h4>📦 未建</h4><div class="product-desc-text">${res.unbuilt_product_desc||'—'}${uAttr.length?`<div class="attr">${uAttr.join(' · ')}</div>`:''}</div></div>
                        <div class="product-card"><h4>🏷️ 已建</h4><div class="product-desc-text">${res.built_product_desc||'—'}${bAttr.length?`<div class="attr">${bAttr.join(' · ')}</div>`:''}</div></div>
                    </div>
                    <div class="dimension-summary">
                        <div class="dimension-card"><h4>📊 方案差异度</h4><div class="dimension-value">${schemeRounded!==null?formatPercent(schemeRounded):(sizeReason==='微小'?'微小':(sizeReason==='复杂组合产品'?'—':'—'))}</div><div class="sub-value">数量差 + 尺寸差</div></div>
                        <div class="dimension-card"><h4>🎨 图案差异度</h4><div class="dimension-value">${formatPercent(appearDiff)}</div><div class="sub-value">豆包AI视觉分析</div></div>
                        <div class="dimension-card"><h4>⚖️ 综合差异度</h4><div class="dimension-value">${formatPercent(combinedRounded)}</div><div class="sub-value">数量差 + 尺寸差 + 图案差</div></div>
                    </div>
                    <div class="formula-area"><div><strong>📐 计算过程：</strong></div>${qDisp}${sizeDisp}<div>图案差异 = ${formatPercent(appearDiff)} (豆包AI)</div><div>综合差异 = ${formatPercent(combinedRounded)}</div></div>
                    <div class="diff-detail">
                        ${funcHtml} ${sceneHtml} ${pioneerHtml}
                        <div class="diff-item"><div class="diff-label">整体目视化差异</div><div class="diff-desc">${res.visual_overall||'—'}</div></div>
                        <div class="diff-item"><div class="diff-label">形状与轮廓</div><div class="diff-desc">${res.shape_contour||'—'}</div></div>
                        <div class="diff-item"><div class="diff-label">图案与装饰</div><div class="diff-desc">${res.pattern_decoration||'—'}</div></div>
                        <div class="diff-item"><div class="diff-label">结构与部件</div><div class="diff-desc">${res.structure_parts||'—'}</div></div>
                        <div class="diff-item"><div class="diff-label">📌 总结性分析</div><div class="diff-desc">${res.summary||'—'}</div></div>
                        ${compHtml}
                    </div>
                    <div class="final-conclusion"><div class="conclusion-text ${isPass?'pass':'fail'}">${isPass?'通过':'不通过'}</div>${!isPass&&passReason?`<div style="font-size:12px;color:#6b7280;">${passReason}</div>`:(isPass&&passReason?`<div style="font-size:12px;color:#15803d;">${passReason}</div>`:'')}</div>
                </div>`;
        }
        const finalPass=overallPass, prodName=cachedUnbuilt?.product_desc||'无';
        let statsHtml='';
        if(pioneerFail) statsHtml=`<div class="summary-stats" style="display:flex;gap:16px;"><div class="stat"><span class="stat-value">❌ 不通过</span></div><div class="stat"><span class="stat-value">与首创款式差异不足</span></div></div>`;
        else{
            let passExtra=''; if(finalCompLevel==='较低竞争'||finalCompLevel==='无竞争') passExtra=`（竞争程度${finalCompLevel}，不构成直接竞争）`;
            statsHtml=`<div class="summary-stats" style="display:flex;gap:16px;"><div class="stat"><span class="stat-value">${finalPass?'✅ 通过':'❌ 不通过'}</span></div><div class="stat">${finalPass?`<span class="stat-value">${formatPercent(finalMin)}</span><span class="stat-label">最小综合差异</span>`:`<span class="stat-value">${formatPercent(finalMin)}</span><span class="stat-label">最小综合差异</span>`}</div></div>${finalPass&&passExtra?`<div style="font-size:12px;color:#15803d;">${passExtra}</div>`:''}`;
        }
        const summaryHtml=`<div class="record-summary"><div class="record-info"><div class="image-row"><div class="thumb"><img src="${cfg.unbuiltThumb}"></div><span class="vs">VS</span>${cfg.builtThumbs.map(t=>`<div class="thumb"><img src="${t}"></div>`).join('')}</div><div class="record-desc">新品ID: ${cfg.newProductId||'未填'}<br>产品名称: ${prodName}</div></div><div class="price-display">💰 未建: ${uPriceDisp} &nbsp;|&nbsp; 已建: ${bPricesDisp}</div>${statsHtml}<span class="toggle-icon">▼</span></div><div class="record-detail" style="display:none;">${allHtml}</div>`;
        return {summaryHtml, detailHtml:allHtml, isPass:finalPass, combinedDiff:finalMin, productName:prodName};
    }

    async function retryAnalysis(rec){
        if(!rec||(rec.status!=='failed'&&rec.status!=='done')) return;
        await updateRecord(rec.id,{status:'analyzing',summaryHtml:'',detailHtml:'',isPass:false,combinedDiff:0,productName:''});
        try{
            const builtCfg=rec.builtConfigs.map((c,idx)=>({imageData:rec.builtImagesData?.[idx]||null,text:c.text,price:c.price,compareType:c.compareType,buildDate:c.buildDate,productType:c.productType})).filter(b=>b.imageData);
            if(!rec.unbuiltImageData) throw new Error('缺少未建原图');
            const cfg={unbuiltImageData:rec.unbuiltImageData,unbuiltText:rec.unbuiltDesc,unbuiltPrice:rec.unbuiltPrice,newProductId:rec.newProductId,unbuiltThumb:rec.unbuiltThumb,builtThumbs:rec.builtThumbs,builtItemsData:builtCfg};
            const r=await analyzeWithConfig(cfg);
            await updateRecord(rec.id,{status:'done',summaryHtml:r.summaryHtml,detailHtml:r.detailHtml,isPass:r.isPass,combinedDiff:r.combinedDiff,productName:r.productName});
        }catch(e){ console.error(e); await updateRecord(rec.id,{status:'failed',summaryHtml:`<div class="record-summary">分析失败: ${e.message}</div>`,detailHtml:'',isPass:false,combinedDiff:0,productName:'分析失败'}); }
    }

    function renderRecordsList(searchTerm=''){
        let expandedId=null; const exist=document.querySelector('.record-detail[style*="display: block"]'); if(exist){ const item=exist.closest('.record-item'); if(item) expandedId=item.getAttribute('data-id'); }
        const cont=document.getElementById('recordsList'); if(!cont) return;
        let filtered=[...historyRecords]; if(searchTerm.trim()){ const t=searchTerm.trim().toLowerCase(); filtered=filtered.filter(r=>r.newProductId&&r.newProductId.toLowerCase().includes(t)); }
        if(filtered.length===0){ cont.innerHTML='<p style="text-align:center;color:#64748b;">暂无记录</p>'; return; }
        let html='';
        filtered.forEach(rec=>{
            const statText=rec.status==='analyzing'?'AI分析中...':(rec.isPass?'通过':'不通过');
            const statClass=rec.status==='analyzing'?'analyzing':(rec.isPass?'pass':'fail');
            const uPriceDisp=rec.unbuiltPrice?`$${parseFloat(rec.unbuiltPrice).toFixed(2)}`:'未填';
            const bPricesDisp=(rec.builtConfigs||[]).map(c=>c.price?`$${parseFloat(c.price).toFixed(2)}`:'未填').join(', ');
            if(rec.summaryHtml) html+=`<div class="record-item" data-id="${rec.id}">${rec.summaryHtml}${rec.status==='failed'?`<div style="text-align:right;"><button class="retry-btn" data-id="${rec.id}">重新分析</button></div>`:''}</div>`;
            else{
                const prodName=rec.productName||(rec.status==='analyzing'?'分析中...':(rec.isPass?'通过':'不通过'));
                html+=`<div class="record-item" data-id="${rec.id}"><div class="record-summary"><div class="record-info"><div class="image-row"><div class="thumb"><img src="${rec.unbuiltThumb||''}"></div><span class="vs">VS</span>${(rec.builtThumbs||[]).map(t=>`<div class="thumb"><img src="${t}"></div>`).join('')}</div><div class="record-desc">新品ID: ${rec.newProductId||'未填'}<br>产品名称: ${prodName}</div></div><div class="price-display">💰 未建: ${uPriceDisp} &nbsp;|&nbsp; 已建: ${bPricesDisp}</div><div class="record-status ${statClass}">${statText}</div>${rec.status==='failed'?`<button class="retry-btn" data-id="${rec.id}">重新分析</button>`:''}<span class="toggle-icon">▼</span></div><div class="record-detail" style="display:none;"></div></div>`;
            }
        });
        cont.innerHTML=html;
        cont.querySelectorAll('.record-item').forEach(item=>{
            const sum=item.querySelector('.record-summary'), det=item.querySelector('.record-detail');
            if(sum&&det) sum.addEventListener('click',e=>{ if(e.target.classList.contains('retry-btn')) return; const hidden=det.style.display==='none'; det.style.display=hidden?'block':'none'; sum.querySelector('.toggle-icon').textContent=hidden?'▲':'▼'; });
            const retry=item.querySelector('.retry-btn'); if(retry) retry.addEventListener('click',async e=>{ e.stopPropagation(); const id=retry.dataset.id; const rec=historyRecords.find(r=>r.id===id); if(rec) await retryAnalysis(rec); });
        });
        if(expandedId){ const tgt=cont.querySelector(`.record-item[data-id="${expandedId}"]`); if(tgt){ const det=tgt.querySelector('.record-detail'), sum=tgt.querySelector('.record-summary'); if(det&&sum&&det.style.display!=='block'){ det.style.display='block'; sum.querySelector('.toggle-icon').textContent='▲'; } } }
    }

    initUnbuilt();
    for(let i=1;i<=1;i++) builtItems[`built_${i}`]={imageDataUrl:null,compressedBase64:null,text:'',price:'',compareType:'non_pioneer',buildDate:'',productType:'regular'};
    rebuildBuiltItems(1);
    builtCountSelect.addEventListener('change',()=>{ rebuildBuiltItems(parseInt(builtCountSelect.value)); });
    document.getElementById('compareBtn').onclick=async function(){
        if(!unbuilt.imageDataUrl){ alert('请上传未建产品图片'); return; }
        const anyBuilt=Object.keys(builtItems).some(k=>builtItems[k].imageDataUrl); if(!anyBuilt){ alert('请至少上传一个已建图片'); return; }
        const uImg=unbuilt.imageDataUrl, uTxt=unbuilt.text, uPrice=unbuilt.price, uThumb=unbuilt.compressedBase64||'', newId=unbuilt.newProductId;
        const builtData=Object.keys(builtItems).map(k=>({imageData:builtItems[k].imageDataUrl,text:builtItems[k].text,price:builtItems[k].price,compareType:builtItems[k].compareType,buildDate:builtItems[k].buildDate,productType:builtItems[k].productType}));
        const bThumbs=Object.keys(builtItems).map(k=>builtItems[k].compressedBase64||'');
        clearComparisonGroup();
        const recId=Date.now()+'_'+Math.random();
        const tmp={ id:recId, newProductId:newId, timestamp:new Date().toLocaleString(), status:'analyzing', summaryHtml:'', detailHtml:'', isPass:false, combinedDiff:0, unbuiltThumb:uThumb, builtThumbs:bThumbs, unbuiltDesc:uTxt, unbuiltPrice:uPrice, builtConfigs:builtData.map(b=>({text:b.text,price:b.price,compareType:b.compareType,buildDate:b.buildDate,productType:b.productType})), productName:'', unbuiltImageData:uImg, builtImagesData:builtData.map(b=>b.imageData) };
        await addRecord(tmp);
        (async()=>{ try{ const cfg={unbuiltImageData:uImg,unbuiltText:uTxt,unbuiltPrice:uPrice,newProductId:newId,unbuiltThumb:uThumb,builtThumbs:bThumbs,builtItemsData:builtData}; const r=await analyzeWithConfig(cfg); await updateRecord(recId,{status:'done',summaryHtml:r.summaryHtml,detailHtml:r.detailHtml,isPass:r.isPass,combinedDiff:r.combinedDiff,productName:r.productName}); }catch(e){ console.error(e); await updateRecord(recId,{status:'failed',summaryHtml:`<div class="record-summary">分析失败: ${e.message}</div>`,detailHtml:'',isPass:false,combinedDiff:0,productName:'分析失败'}); } })();
    };

    const searchInp=document.getElementById('historySearchInput'), searchBtn=document.getElementById('historySearchBtn'), resetBtn=document.getElementById('historyResetBtn'), clearBtn=document.getElementById('clearHistoryBtn');
    searchBtn.addEventListener('click',()=>renderRecordsList(searchInp.value));
    resetBtn.addEventListener('click',()=>{ searchInp.value=''; renderRecordsList(''); });
    clearBtn.addEventListener('click',async()=>{ if(confirm('确定清空所有记录？')) await clearHistory(); });
    searchInp.addEventListener('keypress',e=>{ if(e.key==='Enter') renderRecordsList(searchInp.value); });

    const qaBtn=document.getElementById('qaAskBtn'), qaQ=document.getElementById('qaQuestion'), qaA=document.getElementById('qaAnswer');
    qaBtn.addEventListener('click',async()=>{ const q=qaQ.value.trim(); if(!q){ alert('请输入问题'); return; } qaA.style.display='block'; qaA.innerHTML='🤔 思考中...'; qaA.classList.add('loading'); try{ const a=await askQuestion(q); qaA.innerHTML=a; qaA.classList.remove('loading'); }catch(e){ qaA.innerHTML=`❌ 回答失败：${e.message}`; qaA.classList.remove('loading'); } });
    qaQ.addEventListener('keypress',e=>{ if(e.key==='Enter') qaBtn.click(); });

    loadHistory().catch(console.error);
})();
</script>
</body>
</html>
